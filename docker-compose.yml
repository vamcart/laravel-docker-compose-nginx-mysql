networks: 
    laravel:
        driver: bridge

services: 
    nginx:
        image: nginx:alpine
        container_name: "${COMPOSE_PROJECT_NAME}-nginx"
        restart: unless-stopped
        tty: true
        ports:
            - "${HOST_MACHINE_UNSECURE_HOST_PORT}:8001"
        volumes: 
            - ./src:/var/www/app
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        environment:
              XDEBUG_CONFIG: "client_host=host.docker.internal remote_port=${XDEBUG_PORT}"
              VAR_DUMPER_SERVER: buggregator:9912
              RAY_HOST: buggregator
              RAY_PORT: 8005
        depends_on: 
            - php
            - mysql
        networks: 
            - laravel

    mysql:
        platform: linux/amd64
        image: mysql
        container_name: "${COMPOSE_PROJECT_NAME}-mysql"
        restart: unless-stopped
        tty: true
        ports: 
            - "${MYSQL_HOST_PORT}:${MYSQL_DOCKER_CONTAINER_PORT}"
        volumes: 
            - ./mysql:/var/lib/mysql
        environment: 
            MYSQL_DATABASE: laravel_docker
            MYSQL_USER: user
            MYSQL_PASSWORD: user
            MYSQL_ROOT_PASSWORD: root
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        networks: 
            - laravel
    php:
        build: ./php
        container_name: "${COMPOSE_PROJECT_NAME}-php"
        restart: unless-stopped
        tty: true
        working_dir: /var/www/app
        volumes: 
            - ./src:/var/www/app
        ports: 
            - "${PHP_HOST_PORT}:${PHP_DOCKER_CONTAINER_PORT}"
        networks: 
            - laravel    
    buggregator:
        image: ghcr.io/buggregator/server:latest
        container_name: ${COMPOSE_PROJECT_NAME}-buggregator-server
        ports:
            - "8005:8000"       # Web UI, Sentry, Ray, Inspector
            - "1025:1025"       # SMTP Fake Mail Server
            - "9912:9912"       # Symfony VarDumper Server
            - "9913:9913"       # Monolog Socket      
        networks: 
            - laravel